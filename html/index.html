<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editor de Cena 3D</title>

    <link rel="stylesheet" href="../css/style.css">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.167.1/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.167.1/examples/jsm/"
        }
    }
    </script>

</head>

<body>

<div id="container">

    <!-- MENU ESQUERDO -->

    <div id="leftPanel">

        <h2>Menu</h2>

        <div class="section">

            <h3>Objeto Selecionado</h3>

            <input
                id="selectedName"
                readonly
            >

        </div>

        <div class="section">

             <h2>Transformações</h2>

             <h3>Translação</h3>


          <!--  <label>X</label>
            <input type="number" id="posX">

            <label>Y</label>
            <input type="number" id="posY">

            <label>Z</label>
            <input type="number" id="posZ">-->

            X
<input type="range"
       id="posX"
       min="-10"
       max="10"
       step="0.1">

Y
<input type="range"
       id="posY"
       min="-10"
       max="10"
       step="0.1">

Z
<input type="range"
       id="posZ"
       min="-10"
       max="10"
       step="0.1">

        </div>

        <div class="section">

            <h3>Rotação</h3>

            <label>X</label>
            <input type="number" id="rotX">

            <label>Y</label>
            <input type="number" id="rotY">

            <label>Z</label>
            <input type="number" id="rotZ">

        </div>

        <div class="section">

            <h3>Escala</h3>

            <label>X</label>
            <input type="number" id="scaleX">

            <label>Y</label>
            <input type="number" id="scaleY">

            <label>Z</label>
            <input type="number" id="scaleZ">

        </div>

<!--botao para aplicar as transformações-->
        <button id="applyTransform">
            Aplicar Transformações
        </button>


        <!--animaçoes-->

<div class="section">

    <h3>Animação</h3>

    <label>Velocidade X</label>
    <input type="range"
           id="speedX"
           min="-0.1"
           max="0.1"
           step="0.001"
           value="0">

    <label>Velocidade Y</label>
    <input type="range"
           id="speedY"
           min="-0.1"
           max="0.1"
           step="0.001"
           value="0">

    <label>Velocidade Z</label>
    <input type="range"
           id="speedZ"
           min="-0.1"
           max="0.1"
           step="0.001"
           value="0">

</div>

        <button id="applyAnimation">
    Aplicar Animação
</button>

<button id="stopAnimation">
    Parar Animação
</button>

<button id="deleteObject">
    Deletar Modelo
</button>

<h3>Hierarquia</h3>

<label>Pai</label>

<select id="parentSelect">
    <option value="">Nenhum</option>
</select>

<button id="applyParent">
    Aplicar Hierarquia
</button>

<button id="removeParent">
    Remover Hierarquia
</button>

        <br><br>

        <button id="saveScene">
            Salvar Cena
        </button>

        <br><br>


<input
    type="file"
    id="loadScene"
    accept=".json"
>

<div class="section">

    <h3>Cor do Modelo</h3>

    <input
        type="color"
        id="objectColor"
        value="#ffffff"
    >

</div>

</div>

<hr>

<div class="section">

<h3>Textura</h3>

<select id="textureSelect">

    <option value="original">Original</option>
    <option value="chocolate">Chocolate</option>
    <option value="morango">Morango</option>
    <option value="glace">Glacê</option>

</select>

    <label>Rotação</label>
    <input type="number"
           id="texRotation"
           value="0">

    <label>Roughness</label>
    <input type="range"
           id="roughness"
           min="0"
           max="1"
           step="0.01"
           value="0.5">

    <label>Metalness</label>
    <input type="range"
           id="metalness"
           min="0"
           max="1"
           step="0.01"
           value="0">

       <label>Opacidade</label>
           <input
    type="range"
    id="opacity"
    min="0"
    max="1"
    step="0.01"
    value="1">

           <button id="applyTexture">
    Aplicar Textura
</button>

<div class="section">

    <h3>Controles</h3>

    <p style="font-size:12px; line-height:1.4;">
        Teclado:<br>
        G = Translação<br>
        R = Rotação<br>
        S = Escala
    </p>

    <p style="font-size:12px; line-height:1.4;">
        Mouse:<br>
        Botão direito = Girar cenário<br>
        Scroll = Zoom
    </p>

</div>

</div>


    <div id="viewport">

        <canvas id="webgl"></canvas>

    </div>

    <!-- MODELOS -->

    </div>

</div>

</body>
